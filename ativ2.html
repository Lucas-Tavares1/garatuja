<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet"href="style.css">
    <title>Evento de carros</title>
</head>
<body>
   <header>Evento de carros</header>
   <h1>Cadastre-se</h1>
   <form action="get">
        <div>
            <label for="">Seu nome completo</label>
            <input type="text">
        </div>

        <div>
            <label for="">Seu CPF</label>
            <input type="text">
        </div>

    <h2>Cadastre seu carro</h2>
        <div>
            <label for="">Modelo do carro</label>
            <input type="text">

        <div>
            <label for="">Ano do carro</label>
            <input type="text">
        </div>

        <div>
            <label for="">Placa do carro</label>
            <input type="text">
        </div>
        
        <button type="submit">Enviar</div>
   </form>
</body>
</html>
